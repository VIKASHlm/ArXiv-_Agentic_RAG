<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArXiv RAG Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --border-bright: #2e2e4e;
    --text: #e2e2f0;
    --text-dim: #6b6b8a;
    --text-dimmer: #3a3a5a;
    --accent: #7c6af7;
    --accent-dim: #3d3580;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --cyan: #22d3ee;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 16px;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--accent); }
    50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border: 1px solid var(--border-bright);
    border-radius: 20px;
    font-size: 11px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  .btn-reset {
    background: none;
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover { border-color: var(--red); color: var(--red); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Chat panel ── */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-bright) transparent;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  /* Welcome state */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 40px;
  }

  .welcome-title {
    font-family: var(--sans);
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.03em;
  }

  .welcome-sub {
    font-size: 13px;
    color: var(--text-dim);
    max-width: 380px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 12px;
    max-width: 500px;
  }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border-bright);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    line-height: 1.4;
  }
  .suggestion:hover {
    border-color: var(--accent);
    color: var(--text);
    background: #16162a;
  }

  /* Messages */
  .msg {
    display: flex;
    flex-direction: column;
    gap: 6px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dimmer);
  }

  .msg-user .msg-label { color: var(--accent-dim); }
  .msg-user .msg-bubble {
    background: #16162a;
    border: 1px solid var(--accent-dim);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 8px 8px 2px 8px;
    font-size: 14px;
    line-height: 1.6;
    align-self: flex-end;
    max-width: 80%;
  }

  .msg-assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    border-radius: 2px 8px 8px 8px;
    font-size: 13px;
    line-height: 1.75;
    max-width: 90%;
    white-space: pre-wrap;
  }

  .msg-assistant.action-clarify .msg-bubble { border-color: var(--amber); }
  .msg-assistant.action-refuse .msg-bubble { border-color: var(--red); }
  .msg-assistant.action-retrieve .msg-bubble { border-color: var(--border); }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .action-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  .badge-RETRIEVE { background: #1a2a1a; color: var(--green); border: 1px solid #2a4a2a; }
  .badge-CLARIFY  { background: #2a2010; color: var(--amber); border: 1px solid #4a3a10; }
  .badge-REFUSE   { background: #2a1010; color: var(--red);   border: 1px solid #4a2020; }
  .badge-ANSWER_FROM_MEMORY { background: #1a1a2a; color: var(--cyan); border: 1px solid #2a2a4a; }

  .meta-score { font-size: 10px; color: var(--text-dimmer); }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px 8px 8px 8px;
    width: fit-content;
  }

  .typing span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-dimmer);
    animation: blink 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── Input area ── */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 6px;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.15s;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dimmer); }

  .send-btn {
    background: var(--accent);
    border: none;
    color: white;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    padding: 0 20px;
    height: 44px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .send-btn:hover { background: #9580ff; }
  .send-btn:disabled { background: var(--border-bright); color: var(--text-dimmer); cursor: not-allowed; }

  .input-hint {
    font-size: 10px;
    color: var(--text-dimmer);
    margin-top: 8px;
  }

  /* ── Debug panel ── */
  .debug-panel {
    width: 300px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .debug-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .debug-logs {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 10px;
    line-height: 1.6;
    animation: fadeUp 0.2s ease;
  }

  .log-ts { color: var(--text-dimmer); margin-bottom: 4px; }

  .log-query {
    color: var(--text);
    margin-bottom: 6px;
    word-break: break-word;
    font-size: 11px;
  }

  .log-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-dim);
  }

  .log-reasoning {
    color: var(--text-dimmer);
    margin-top: 6px;
    font-style: italic;
    word-break: break-word;
  }

  .debug-empty {
    color: var(--text-dimmer);
    font-size: 11px;
    text-align: center;
    padding: 40px 20px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    ArXiv RAG Agent
  </div>
  <div class="header-meta">
    <div class="status-pill">
      <div class="status-dot"></div>
      LangGraph · HyDE · Qdrant
    </div>
    <button class="btn-reset" onclick="resetSession()">↺ Reset</button>
  </div>
</header>

<div class="layout">

  <!-- Chat -->
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="logo-dot" style="width:12px;height:12px;margin-bottom:8px"></div>
        <div class="welcome-title">Ask about AI research</div>
        <div class="welcome-sub">
          Querying 50 recent cs.AI papers via HyDE retrieval.<br>
          The agent decides when to retrieve, clarify, or refuse.
        </div>
        <div class="suggestions">
          <button class="suggestion" onclick="fillQuery('How does chain-of-thought prompting improve LLM reasoning?')">
            Chain-of-thought prompting
          </button>
          <button class="suggestion" onclick="fillQuery('What are efficient fine-tuning methods for large language models?')">
            Efficient fine-tuning methods
          </button>
          <button class="suggestion" onclick="fillQuery('How do diffusion models generate images?')">
            How diffusion models work
          </button>
          <button class="suggestion" onclick="fillQuery('Tell me more about that approach.')">
            Test clarify: "that approach"
          </button>
          <button class="suggestion" onclick="fillQuery('What is the best recipe for biryani?')">
            Test refuse: biryani recipe
          </button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea
          id="input"
          placeholder="Ask about AI/ML research papers..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          Send ↵
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for newline</div>
    </div>
  </div>

  <!-- Debug panel -->
  <div class="debug-panel">
    <div class="debug-header">
      ⬡ Decision log
    </div>
    <div class="debug-logs" id="debugLogs">
      <div class="debug-empty">Decisions will appear here after each query.</div>
    </div>
  </div>

</div>

<script>
  let isLoading = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function fillQuery(text) {
    const input = document.getElementById('input');
    input.value = text;
    input.focus();
    autoResize(input);
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendUserMessage(text) {
    hideWelcome();
    const div = document.createElement('div');
    div.className = 'msg msg-user';
    div.innerHTML = `
      <div class="msg-label">You</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    `;
    document.getElementById('messages').appendChild(div);
    scrollBottom();
  }

  function appendTyping() {
    const div = document.createElement('div');
    div.className = 'msg msg-assistant';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="msg-label">Agent</div>
      <div class="typing"><span></span><span></span><span></span></div>
    `;
    document.getElementById('messages').appendChild(div);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function appendAssistantMessage(data) {
    const { answer, action, score, latency_ms, reasoning } = data;
    const div = document.createElement('div');
    div.className = `msg msg-assistant action-${action.toLowerCase()}`;

    const scoreBar = score > 0 ? `
      <span class="meta-score">score ${score} · ${latency_ms}ms</span>
    ` : '';

    div.innerHTML = `
      <div class="msg-label">Agent</div>
      <div class="msg-bubble">${escHtml(answer)}</div>
      <div class="msg-meta">
        <span class="action-badge badge-${action}">${action}</span>
        ${scoreBar}
      </div>
    `;
    document.getElementById('messages').appendChild(div);
    scrollBottom();
  }

  function addDebugEntry(data) {
    const logs = document.getElementById('debugLogs');

    // Remove empty state
    const empty = logs.querySelector('.debug-empty');
    if (empty) empty.remove();

    const { query, action, score, latency_ms, reasoning } = data;
    const ts = new Date().toLocaleTimeString();

    const actionColors = {
      RETRIEVE: '#4ade80', CLARIFY: '#fbbf24',
      REFUSE: '#f87171', ANSWER_FROM_MEMORY: '#22d3ee'
    };
    const color = actionColors[action] || '#6b6b8a';

    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `
      <div class="log-ts">${ts}</div>
      <div class="log-query">${escHtml(query.slice(0, 80))}${query.length > 80 ? '…' : ''}</div>
      <div class="log-row">
        <span style="color:${color};font-weight:700;font-size:9px;letter-spacing:0.1em">${action}</span>
        <span class="meta-score">score ${score}</span>
      </div>
      <div class="log-reasoning">${escHtml(reasoning || '')}</div>
    `;

    // Prepend so newest is on top
    logs.insertBefore(div, logs.firstChild);
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const query = input.value.trim();
    if (!query || isLoading) return;

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendUserMessage(query);
    appendTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      const data = await res.json();
      removeTyping();
      appendAssistantMessage(data);
      addDebugEntry({ query, ...data });
    } catch (err) {
      removeTyping();
      appendAssistantMessage({
        answer: 'Error: could not reach the agent. Is ui_server.py running?',
        action: 'REFUSE',
        score: 0,
        latency_ms: 0,
        reasoning: err.message,
      });
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  async function resetSession() {
    await fetch('/reset', { method: 'POST' });
    const messages = document.getElementById('messages');
    messages.innerHTML = `
      <div class="welcome" id="welcome">
        <div class="logo-dot" style="width:12px;height:12px;margin-bottom:8px"></div>
        <div class="welcome-title">Ask about AI research</div>
        <div class="welcome-sub">
          Querying 50 recent cs.AI papers via HyDE retrieval.<br>
          The agent decides when to retrieve, clarify, or refuse.
        </div>
        <div class="suggestions">
          <button class="suggestion" onclick="fillQuery('How does chain-of-thought prompting improve LLM reasoning?')">Chain-of-thought prompting</button>
          <button class="suggestion" onclick="fillQuery('What are efficient fine-tuning methods for large language models?')">Efficient fine-tuning methods</button>
          <button class="suggestion" onclick="fillQuery('How do diffusion models generate images?')">How diffusion models work</button>
          <button class="suggestion" onclick="fillQuery('Tell me more about that approach.')">Test clarify: "that approach"</button>
          <button class="suggestion" onclick="fillQuery('What is the best recipe for biryani?')">Test refuse: biryani recipe</button>
        </div>
      </div>
    `;
    document.getElementById('debugLogs').innerHTML = '<div class="debug-empty">Decisions will appear here after each query.</div>';
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
